version: 1
updated: __DATE__
project: __PROJECT_NAME__
domain: __DOMAIN__

mode: approval_only
principle: max_quality_under_budget

token_budget:
  raw_data_in_context: false
  progressive_disclosure: true
  cache_first: true
  max_context_input_tokens_per_phase: 45000
  max_output_tokens_per_artifact: 7000
  max_raw_rows_loaded: 200
  distillate_max_lines: 220
  browser_session_budget_minutes: 20
  browser_pages_per_phase_cap: 20

money_budget:
  monthly_total_usd_cap: 0
  monthly_paid_api_usd_cap: 0
  monthly_llm_usd_cap: 0
  cloud_budget_alert_usd: 5
  require_approval_over_usd: 0
  ads_spend_enabled: false

subscriptions:
  neuronwriter:
    status: not_configured
    plan: not_configured
    monthly_content_writer_limit: 0
    monthly_ai_credit_limit: 0
    reserve_until_reset: 0
    policy_file: seo/neuronwriter-limits.yaml
  google_cloud_nlp:
    status: disabled_until_budget_and_local_guards
    monthly_budget_alert_usd: 5
    default_features: [analyzeEntities, classifyText, analyzeSyntax]
    policy_file: seo/entities/google-nlp-policy.yaml
  keys_so:
    status: not_configured
    monthly_request_cap: 0
    reserve_requests: 0
    cache_ttl_days: 60
  serpstat:
    status: not_configured
    monthly_credit_cap: 0
    reserve_credits: 0
    cache_ttl_days: 30
  spyfu:
    status: disabled_for_ru_by_default
    monthly_usd_cap: 0
    cache_ttl_days: 30
  dataforseo:
    status: disabled_until_budget_approval
    monthly_usd_cap: 0
  openai:
    status: optional
    monthly_usd_cap: 0
  anthropic:
    status: optional
    monthly_usd_cap: 0
  perplexity:
    status: browser_or_subscription
    monthly_usd_cap: 0
  google_ads:
    status: approval_only
    monthly_spend_cap: 0
  yandex_direct:
    status: approval_only
    monthly_spend_cap: 0
  microsoft_ads:
    status: skipped_if_billing_required
    monthly_spend_cap: 0

run_guards:
  require_cache_check_before:
    - google_cloud_nlp
    - neuronwriter
    - keys_so
    - serpstat
    - spyfu
    - dataforseo
    - browser_mass_collection
  require_human_approval_before:
    - paid_api_run
    - publishing
    - index_submission
    - ads_launch
    - tracking_tag_install
    - whole_site_audit_paid
  stop_when:
    - budget_cap_reached
    - missing_policy_file
    - missing_cache_for_large_source
    - unapproved_tracking_for_rf_project
