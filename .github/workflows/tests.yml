name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --quiet ruff
      - name: Lint (errors, undefined names, unused imports/vars, bugbear)
        run: ruff check --select E9,F63,F7,F82,F401,F841,B,PLE scripts/ tests/

  typecheck-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mypy
        run: python -m pip install --quiet mypy pyyaml pydantic
      - name: mypy on the core package
        run: mypy scripts/seo_cycle_core --ignore-missing-imports

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck (error severity)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S error scripts/*.sh

  coverage-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install --quiet coverage pyyaml
      - name: In-process coverage of seo_cycle_core (subprocess-driven tests not counted)
        run: |
          coverage run --source=scripts/seo_cycle_core -m unittest discover -s tests
          coverage report --fail-under=50

  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --quiet pyyaml
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Strict config-schema validation of the template (informational)
        run: |
          python -m pip install --quiet pydantic
          python scripts/validate-config.py config/project.template.yaml --strict || true
