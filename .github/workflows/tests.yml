name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --quiet pyyaml
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Strict config-schema validation of the template (informational)
        run: |
          python -m pip install --quiet pydantic
          python scripts/validate-config.py config/project.template.yaml --strict || true
