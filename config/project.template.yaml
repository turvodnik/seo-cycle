# =============================================================================
# seo-cycle: project configuration template (schema v1.1)
# =============================================================================
# Скопируй этот файл в корень своего проекта как `seo-cycle.yaml` (или
# `.seo-cycle.yaml`) и заполни под конкретный сайт. Все поля с примерами —
# подставь свои значения. Закомментированные блоки можно удалить если не
# нужны (например, отключаешь Яндекс если работаешь только на западный рынок).
#
# Скилл seo-cycle ищет конфиг в таком порядке:
#   1. ./seo-cycle.yaml
#   2. ./.seo-cycle.yaml
#   3. ./seo/seo-cycle.yaml
#   4. ./.claude/seo-cycle.yaml
#
# Валидация: `python3 ./.codex/skills/seo-cycle/scripts/validate-config.py`

# -----------------------------------------------------------------------------
# 1. Identity — кто мы
# -----------------------------------------------------------------------------
project:
  name: "Example Shop"                    # человеческое имя проекта
  domain: "example.com"
  brand_name_user_facing: "Example Shop"  # как пишем в текстах (важно для кириллических брендов)
  brand_name_technical: "example"         # для URL, slug, кода — латиница
  description: |
    Краткое описание проекта в 1-3 предложения. Кто целевая аудитория,
    что продаём, какая ниша. Используется как контекст для LLM-промптов.

# -----------------------------------------------------------------------------
# 2. Geo & Locale — где работаем
# -----------------------------------------------------------------------------
locale:
  language: ru                  # ISO 639-1 — основной язык контента
  country: RU                   # ISO 3166-1 alpha-2
  region: "Москва и Московская область"  # человеческое название региона
  city: "Москва"
  locale_iso: ru-RU
  # Yandex region code: 213=Москва, 1=МО, 225=Россия, и т.д.
  yandex_region_code: 213
  # Google: gl + hl
  google_gl: ru
  google_hl: ru
  # Часовой пояс (для cron, мониторинга, контент-плана)
  timezone: "Europe/Moscow"

# -----------------------------------------------------------------------------
# 3. Search engines — куда оптимизируем
# -----------------------------------------------------------------------------
# Если в списке нет — соответствующая фаза скилла пропускается.
# Порядок = приоритет (первый важнее).
engines:
  - name: yandex
    priority: 1
  - name: google
    priority: 2
  # - name: bing
  # - name: baidu

# Региональный профиль источников: ru | eu | us | global.
# Одной строкой задаёт, какие источники применимы для региона (Яндекс-стек для ru,
# западные SaaS для eu/us и т.д.) и какие недоступны/нужен прокси. Развернётся
# через scripts/resolve-sources.py; секция sources ниже хранит только параметры
# исполнения и явные override. Профили: config/region-profiles/*.yaml.
region_profile: ru

# Кэш ресёрча: не перезапускать дорогой сбор, если свежий результат моложе N дней.
research_cache_ttl_days: 14

# Основной мозг-оркестратор: auto | claude | codex (см. docs/codex-runtime.md).
# auto — скрипты детектят по env. В codex-режиме генерация изображений, браузер
# и делегирование идут через нативные Codex-skills, а не codex exec обёртки.
runtime: auto

# Файловое логирование скриптов (stdout остаётся для данных/отчётов).
# Лог пишется в seo/logs/seo-cycle-YYYY-MM-DD.log; секцию можно опустить —
# дефолты совпадают с показанными. env SEO_CYCLE_LOG_LEVEL=off выключает файл.
logging:
  enabled: true
  dir: seo/logs
  level: INFO                # уровень файла: DEBUG | INFO | WARNING | ERROR
  stderr_level: WARNING      # что дублировать в stderr

