  live_http_default: disabled
  paid_api_default: disabled
  checks: [technical_rollup, broken_links, redirect_map, lighthouse_cwv, gsc_url_inspection, bing_url_inspection, serpstat_site_audit, labrika_export, labrika_health, technical_mcp_health]
  linkinator:
    enabled: true
    live_requires_flag: true
    default_recurse: false
  redirects:
    enabled: true
    input_columns: [old_url, new_url, source, target, from, to]
    live_requires_flag: true
  lighthouse:
    enabled: true
    input_json_preferred: true
    live_requires_flag: true
    mcp_optional: true
  google_search_console:
    enabled: true
    url_inspection_enabled: true
    env: GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN
    live_requires_flag: true
    read_only: true
  bing_webmaster:
    enabled: true
    url_inspection_enabled: true
    env: BING_WEBMASTER_API_KEY
    live_requires_flag: true
    read_only: true
  serpstat:
    enabled: false
    env: SERPSTAT_API_KEY
    live_requires_flag: true
    credit_guard: true
    actions: [projects, create-project, start, stop, list, poll, default-settings, settings, set-settings, basic-info, categories, scan-urls, issue-report, error-elements, sub-elements, history-errors, export]
  labrika:
    enabled: true
