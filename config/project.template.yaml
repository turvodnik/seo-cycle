  labrika_health_json: seo/technical/labrika-health.json
  latest_labrika_health: seo/technical/latest-labrika-health.md
  latest_labrika_health_json: seo/technical/latest-labrika-health.json
  technical_mcp_health_report: seo/technical/technical-mcp-health.md
  technical_mcp_health_json: seo/technical/technical-mcp-health.json
  latest_technical_mcp_health: seo/technical/latest-technical-mcp-health.md
  latest_technical_mcp_health_json: seo/technical/latest-technical-mcp-health.json

# -----------------------------------------------------------------------------
# 3b. Governance — лимиты токенов, денег, подписок и автоматизаций
# -----------------------------------------------------------------------------
# Это верхний контракт для "мега-мозга": максимум качества при управляемом
# расходе токенов/API/подписок. Перед платными источниками, большими браузерными
# сессиями, публикацией или scheduled automation сверяйся с этим блоком и
# policy-файлами выше.
governance:
  profile: lean_quality              # lean_quality | balanced_growth | aggressive_growth | custom
  objective: max_quality_under_budget

  token_policy:
    raw_data_in_context: false       # сырьё на диск, в контекст только distillate
    progressive_disclosure: true     # читать только нужные docs/templates/scripts
    require_distillate_before_synthesis: true
    max_context_input_tokens_per_phase: 45000
    max_output_tokens_per_artifact: 7000
    max_raw_rows_loaded: 200
    distillate_max_lines: 220
    cache_first: true                # перед дорогим сбором проверять cache/TTL
    browser_session_budget_minutes: 20
    browser_pages_per_phase_cap: 20

  budget_policy:
    monthly_total_usd_cap: 0         # 0 = no paid spend by default
    monthly_paid_api_usd_cap: 0
    monthly_llm_usd_cap: 0
    monthly_ads_usd_cap: 0           # кап расходов ads-категории в usage-ledger
    require_approval_over_usd: 0
    cloud_budget_alert_usd: 5
    ads_spend_enabled: false
    paid_tools_default: approval_only # disabled | approval_only | enabled_with_caps

  subscriptions:
    neuronwriter:
      enabled: false
      plan: not_configured
      limits_file: seo/neuronwriter-limits.yaml
      monthly_content_writer_limit: 0
      monthly_ai_credit_limit: 0
      monthly_plagiarism_check_limit: 0
      reserve_plagiarism_checks: 0
    writerzen:
      enabled: false
      plan: not_configured
      browser_export_only: true
      daily_topic_lookup_limit: 0
      daily_keyword_lookup_limit: 0
      monthly_keyword_credit_limit: 0
      monthly_article_limit: 0
      monthly_ai_words_limit: 0
    google_cloud_nlp:
      enabled: false
      budget_file: seo/entities/google-nlp-policy.yaml
    keys_so:
      enabled: false
      monthly_request_cap: 0
      reserve_requests: 0
    serpstat:
      enabled: false
      monthly_credit_cap: 0
      reserve_credits: 0
    spyfu:
      enabled: false
      monthly_usd_cap: 0
    dataforseo:
      enabled: false
      monthly_usd_cap: 0

  # Автоцикл качества (loop-runner.py): gate -> repair -> re-check с лимитом
  # попыток и самопроверками (quality/evidence классы findings). При исчерпании
  # лимита или отсутствии прогресса создаётся loop_escalation approval-тикет.
  loop:
    enabled: true
    max_attempts: 5                   # глобальный лимит попыток на один loop
    no_progress_after: 2              # одинаковые findings N раз подряд -> ранняя эскалация
    escalate: true                    # ticket + Telegram alert при остановке
    targets:
      research_package:
        max_attempts: 5
      page_outline:
        max_attempts: 3
      draft:
        max_attempts: 3

  automation_policy:
    default_mode: approval_only       # disabled | report_only | approval_only | auto_with_caps
    create_schedules: false
    planner_script: "./.codex/skills/seo-cycle/scripts/automation-plan.py"
    output_dir: "seo/automations"
    allowed_without_approval:
      - cached_fetch
      - robots_sitemap_check
      - public_pagespeed_check
      - read_only_index_status
    approval_required:
      - publishing
      - index_submission
      - paid_api_run
      - browser_mass_collection
      - content_rewrite
      - schema_change
    forbidden_without_explicit_policy:
      - paid_ads_launch
      - tracking_tag_install
      - whole_site_paid_nlp
      - whole_catalog_generation
      - destructive_indexing_change

# -----------------------------------------------------------------------------
# 3b'. Платная реклама (Google Ads / Яндекс.Директ) — guarded полуавтомат
# -----------------------------------------------------------------------------
# Слой выключен по умолчанию. Fetch — read-only (кэш/--input-file, live только
# с usage-ledger preflight). Применение изменений — ТОЛЬКО ads-apply.py с
# approved ticket + --live --allow-write. Для region_profile: ru primary канал —
# Яндекс.Директ; Google Ads в статусе region_limited — это норма, драфты
# экспортируются в Google Ads Editor CSV.
ads:
  enabled: false
  primary_platform: auto          # auto | yandex_direct | google_ads (auto: ru → yandex_direct)
  policy: approval_only           # report_only (apply заблокирован) | approval_only
  cache_ttl_hours: 24
  fetch:
    max_requests_per_run: 200
  yandex_direct:
    enabled: false
    sandbox: false                # сначала репетируй apply в песочнице Директа
    client_login: ""              # или env YANDEX_DIRECT_CLIENT_LOGIN
  google_ads:
    enabled: false
    apply_enabled: false          # API-запись выключена: используем Editor CSV
    customer_id: ""               # или env GOOGLE_ADS_CUSTOMER_ID
  analytics:
    top_position_threshold: 3     # органика в топ-N + активная ставка → снизить/пауза
    wasted_spend_min_cost: 300    # cost без конверсий выше порога → минус-слова
  apply:
    max_changes_per_run: 20       # жёсткий кап операций за один ads-apply
    max_daily_budget: 0           # 0 = бюджеты не трогаем вообще

# -----------------------------------------------------------------------------
# 3c. SEO/AEO/GEO vNext — report-only модули расширенного оркестратора
# -----------------------------------------------------------------------------
# Все блоки ниже безопасны по умолчанию: они генерируют локальные отчёты и
# JSONL-контракты, но не публикуют, не ставят счётчики, не отправляют URL в
# индекс и не запускают платные API без отдельного approval/budget policy.
vnext:
